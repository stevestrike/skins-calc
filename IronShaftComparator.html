document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e:clamp(30px,5vw,48px);line-height:1.0;margin:0;letter-spacing:-.015em\">Iron Shaft Comparator<\u002Fh1>\n      <p style=\"margin:11px 0 0;color:#6b6f66;font-size:15px;max-width:54ch;line-height:1.5\">Filter {{ total }} iron shafts by weight, flex and launch — then line up your shortlist side by side, or let the fitting wizard rank them for your swing.<\u002Fp>\n    <\u002Fdiv>\n    <button onclick=\"{{ onOpenWizard }}\" style=\"display:inline-flex;align-items:center;gap:9px;background:#1f5135;color:#fbfaf5;border:none;border-radius:11px;padding:13px 19px;font-family:'Hanken Grotesk',sans-serif;font-size:14.5px;font-weight:600;cursor:pointer;box-shadow:0 2px 10px rgba(31,81,53,.22)\" style-hover=\"background:#27623f;box-shadow:0 4px 16px rgba(31,81,53,.3)\">\n      <span style=\"font-size:17px;line-height:1\">◎<\u002Fspan> Find my match\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px\">\n    <div style=\"position:relative;flex:1 1 260px;min-width:200px\">\n      <span style=\"position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#9aa093;font-size:14px\">⌕<\u002Fspan>\n      <input value=\"{{ search }}\" oninput=\"{{ onSearch }}\" placeholder=\"Search model, family or brand…\" style=\"width:100%;padding:11px 13px 11px 32px;border:1px solid #dad7cc;border-radius:10px;background:#fffdf8;font-family:'Hanken Grotesk',sans-serif;font-size:14px;color:#1b1d1a;outline:none\" style-focus=\"border-color:#1f5135\">\n    <\u002Fdiv>\n    <div style=\"display:flex;background:#eceadf;border-radius:10px;padding:3px;gap:2px\">\n      <sc-for list=\"{{ viewOptions }}\" as=\"opt\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <select value=\"{{ sortValue }}\" onchange=\"{{ onSortChange }}\" style=\"padding:11px 13px;border:1px solid #dad7cc;border-radius:10px;background:#fffdf8;font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;color:#1b1d1a;cursor:pointer;outline:none\">\n      <sc-for list=\"{{ sortOptions }}\" as=\"o\" hint-placeholder-count=\"6\">\n        <option value=\"{{ o.value }}\">{{ o.label }}<\u002Foption>\n      <\u002Fsc-for>\n    <\u002Fselect>\n  <\u002Fdiv>\n\n  <div style=\"background:#fffdf8;border:1px solid #e5e2d8;border-radius:14px;padding:16px 18px;margin-bottom:18px\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:15px\">\n      <div style=\"display:flex;align-items:center;gap:10px\">\n        <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8b9082\">Filters<\u002Fspan>\n        <sc-if value=\"{{ hasActive }}\" hint-placeholder-val=\"{{ true }}\">\n          <span style=\"background:#e8efe7;color:#1f5135;border-radius:999px;padding:2px 9px;font-size:11.5px;font-weight:600;font-family:'Spline Sans Mono',monospace\">{{ activeCount }} active<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <button onclick=\"{{ onReset }}\" style=\"background:none;border:none;color:#6b6f66;font-family:'Hanken Grotesk',sans-serif;font-size:13px;cursor:pointer;text-decoration:underline;text-underline-offset:3px\" style-hover=\"color:#1f5135\">Reset all<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:18px 24px\">\n      <div>\n        <div style=\"font-size:12px;font-weight:600;color:#3c3f38;margin-bottom:9px\">Brand<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n          <sc-for list=\"{{ brandChips }}\" as=\"opt\" hint-placeholder-count=\"6\"><button onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:12px;font-weight:600;color:#3c3f38;margin-bottom:9px\">Material<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n          <sc-for list=\"{{ matChips }}\" as=\"opt\" hint-placeholder-count=\"3\"><button onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\"><span style=\"{{ opt.dot }}\"><\u002Fspan>{{ opt.label }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:12px;font-weight:600;color:#3c3f38;margin-bottom:9px\">Flex<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n          <sc-for list=\"{{ flexChips }}\" as=\"opt\" hint-placeholder-count=\"5\"><button onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:12px;font-weight:600;color:#3c3f38;margin-bottom:9px\">Launch<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n          <sc-for list=\"{{ launchChips }}\" as=\"opt\" hint-placeholder-count=\"3\"><button onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"grid-column:span 2;min-width:230px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px\">\n          <span style=\"font-size:12px;font-weight:600;color:#3c3f38\">Weight range<\u002Fspan>\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-size:12.5px;color:#1f5135;font-weight:500\">{{ wMin }} – {{ wMax }} g<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:center\">\n          <div style=\"flex:1\">\n            <input type=\"range\" min=\"50\" max=\"135\" step=\"1\" value=\"{{ wMin }}\" oninput=\"{{ onWMin }}\" style=\"width:100%\">\n            <div style=\"font-size:10.5px;color:#9aa093;margin-top:2px;font-family:'Spline Sans Mono',monospace\">MIN<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1\">\n            <input type=\"range\" min=\"50\" max=\"135\" step=\"1\" value=\"{{ wMax }}\" oninput=\"{{ onWMax }}\" style=\"width:100%\">\n            <div style=\"font-size:10.5px;color:#9aa093;margin-top:2px;font-family:'Spline Sans Mono',monospace;text-align:right\">MAX<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ matchActive }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;background:#e8efe7;border:1px solid #cfe0d0;border-radius:12px;padding:13px 17px;margin-bottom:16px\">\n      <div style=\"display:flex;align-items:center;gap:11px;min-width:240px\">\n        <span style=\"font-size:18px\">◎<\u002Fspan>\n        <div>\n          <div style=\"font-size:13.5px;font-weight:600;color:#1f5135\">Ranked for your swing<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#5d7a64;font-family:'Spline Sans Mono',monospace;margin-top:2px\">{{ wizSummary }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px\">\n        <label style=\"display:flex;align-items:center;gap:7px;font-size:13px;color:#3c5e44;cursor:pointer;user-select:none\">\n          <input type=\"checkbox\" checked=\"{{ topOnly }}\" onchange=\"{{ onTopOnly }}\" style=\"accent-color:#1f5135;width:16px;height:16px\"> Top matches only\n        <\u002Flabel>\n        <button onclick=\"{{ onClearMatch }}\" style=\"background:#fff;border:1px solid #cfe0d0;color:#1f5135;border-radius:8px;padding:7px 13px;font-family:'Hanken Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer\">Clear<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px\">\n    <div style=\"font-size:13.5px;color:#6b6f66\"><span style=\"font-weight:700;color:#1b1d1a;font-family:'Spline Sans Mono',monospace\">{{ shownCount }}<\u002Fspan> of {{ total }} shafts<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TABLE VIEW -->\n  <sc-if value=\"{{ isTable }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"overflow-x:auto;border:1px solid #e5e2d8;border-radius:14px;background:#fffdf8\">\n      <sc-if value=\"{{ matchActive }}\" hint-placeholder-val=\"{{ false }}\"><\u002Fsc-if><sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"10\">\n            <\u002Fsc-for><sc-if value=\"{{ matchActive }}\" hint-placeholder-val=\"{{ false }}\"><\u002Fsc-if><table style=\"width:100%;border-collapse:collapse;min-width:680px\">\n        <thead>\n          <tr style=\"background:#f0eee4\">\n            <th style=\"width:42px;padding:12px 10px 12px 16px\"><\u002Fth>\n            <th onclick=\"{{ hName }}\" style=\"text-align:left;padding:12px 14px;font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#6b6f66;cursor:pointer;white-space:nowrap\">Shaft {{ aName }}<\u002Fth>\n            <th onclick=\"{{ hBrand }}\" style=\"text-align:left;padding:12px 14px;font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#6b6f66;cursor:pointer;white-space:nowrap\">Brand {{ aBrand }}<\u002Fth>\n            <th style=\"text-align:left;padding:12px 14px;font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#6b6f66;white-space:nowrap\">Material<\u002Fth>\n            <th onclick=\"{{ hFlex }}\" style=\"text-align:left;padding:12px 14px;font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#6b6f66;cursor:pointer;white-space:nowrap\">Flex {{ aFlex }}<\u002Fth>\n            <th onclick=\"{{ hWeight }}\" style=\"text-align:right;padding:12px 14px;font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#6b6f66;cursor:pointer;white-space:nowrap\">Weight {{ aWeight }}<\u002Fth>\n            <th onclick=\"{{ hLaunch }}\" style=\"text-align:left;padding:12px 14px;font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#6b6f66;cursor:pointer;white-space:nowrap\">Launch {{ aLaunch }}<\u002Fth>\n            <th style=\"text-align:right;padding:12px 16px 12px 14px;font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#1f5135;white-space:nowrap\">Fit<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr style=\"{{ r.rowStyle }}\" style-hover=\"background:#f6f4ea\">\n              <td style=\"padding:10px 10px 10px 16px;text-align:center\"><button onclick=\"{{ r.onToggle }}\" title=\"Add to compare\" style=\"{{ r.checkStyle }}\">{{ r.checkMark }}<\u002Fbutton><\u002Ftd>\n              <td style=\"padding:11px 14px\"><div style=\"display:flex;align-items:center;gap:9px\"><span style=\"{{ r.dotStyle }}\"><\u002Fspan><span style=\"font-size:13.5px;font-weight:500;color:#1b1d1a\">{{ r.name }}<\u002Fspan><\u002Fdiv><\u002Ftd>\n              <td style=\"padding:11px 14px;font-size:13px;color:#6b6f66;white-space:nowrap\">{{ r.brand }}<\u002Ftd>\n              <td style=\"padding:11px 14px;font-size:13px;color:#6b6f66\">{{ r.material }}<\u002Ftd>\n              <td style=\"padding:11px 14px\"><span style=\"{{ r.flexPill }}\">{{ r.flexLabel }}<\u002Fspan><\u002Ftd>\n              <td style=\"padding:11px 14px;text-align:right;font-family:'Spline Sans Mono',monospace;font-size:13px;color:#1b1d1a;white-space:nowrap\">{{ r.weightText }}<\u002Ftd>\n              <td style=\"padding:11px 14px\"><span style=\"{{ r.launchPill }}\">{{ r.launch }}<\u002Fspan><\u002Ftd>\n              <td style=\"padding:11px 16px 11px 14px;text-align:right\"><span style=\"{{ r.scoreStyle }}\">{{ r.scoreText }}<\u002Fspan><\u002Ftd>\n            <\u002Ftr>\n          \n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"text-align:center;padding:48px 20px;color:#9aa093;font-size:14px\">No shafts match these filters. <button onclick=\"{{ onReset }}\" style=\"background:none;border:none;color:#1f5135;font:inherit;cursor:pointer;text-decoration:underline\">Reset<\u002Fbutton><\u002Fdiv><\u002Fsc-if>\n  <\u002Fsc-if>\n\n  <!-- CARD VIEW -->\n  <sc-if value=\"{{ isCards }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:14px\">\n      <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"8\">\n        <div style=\"{{ r.cardStyle }}\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:13px\">\n            <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"{{ r.dotStyle }}\"><\u002Fspan><span style=\"font-size:11.5px;color:#8b9082;font-weight:500\">{{ r.brand }}<\u002Fspan><\u002Fdiv>\n            <button onclick=\"{{ r.onToggle }}\" style=\"{{ r.checkStyle }}\">{{ r.checkMark }}<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"font-size:15px;font-weight:600;line-height:1.25;margin-bottom:14px;min-height:38px\">{{ r.name }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:9px\"><span style=\"font-size:11.5px;color:#8b9082\">Weight<\u002Fspan><span style=\"font-family:'Spline Sans Mono',monospace;font-size:13.5px;font-weight:500\">{{ r.weightText }}<\u002Fspan><\u002Fdiv>\n          <div style=\"height:5px;background:#eceadf;border-radius:3px;overflow:hidden;margin-bottom:13px\"><div style=\"{{ r.weightBar }}\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;align-items:center\">\n            <span style=\"{{ r.flexPill }}\">{{ r.flexLabel }}<\u002Fspan>\n            <span style=\"{{ r.launchPill }}\">{{ r.launch }} launch<\u002Fspan>\n            <sc-if value=\"{{ r.showScore }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ r.scoreStyle }}\">{{ r.scoreText }} fit<\u002Fspan><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"text-align:center;padding:48px 20px;color:#9aa093;font-size:14px\">No shafts match these filters. <button onclick=\"{{ onReset }}\" style=\"background:none;border:none;color:#1f5135;font:inherit;cursor:pointer;text-decoration:underline\">Reset<\u002Fbutton><\u002Fdiv><\u002Fsc-if>\n  <\u002Fsc-if>\n\n  <!-- CHART VIEW -->\n  <sc-if value=\"{{ isChart }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:#fffdf8;border:1px solid #e5e2d8;border-radius:14px;padding:18px\">\n      <div style=\"display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin-bottom:14px\">\n        <span style=\"font-size:12.5px;color:#6b6f66\">Weight × launch — each dot is a shaft, click to compare · axis zooms to <span style=\"font-family:'Spline Sans Mono',monospace;color:#1f5135\">{{ chartDomain }}<\u002Fspan><\u002Fspan>\n        <div style=\"display:flex;gap:14px;margin-left:auto\">\n          <span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#6b6f66\"><span style=\"width:11px;height:11px;border-radius:50%;background:#44627a;display:inline-block\"><\u002Fspan>Steel<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#6b6f66\"><span style=\"width:11px;height:11px;border-radius:50%;background:#a9692f;display:inline-block\"><\u002Fspan>Graphite<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#6b6f66\"><span style=\"width:11px;height:11px;border-radius:50%;background:#7a5aa6;display:inline-block\"><\u002Fspan>Composite<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;height:clamp(320px,48vh,460px);border-left:1.5px solid #d9d6cb;border-bottom:1.5p flex:t[4], flexLabel:t[5], weight:t[6], approx:t[7], launch:t[8], up:t[9], matColor:matColor[t[3]], flexColor:flexColor[t[4]] }));\n  }\n\n  _score(s,p){\n    const fo=['Ladies','Senior','Regular','Stiff','X-Stiff'];\n    const lo=['Low','Mid','High'];\n    const sp=p.speed; let tf;\n    if(sp<75)tf=0; else if(sp<84)tf=1; else if(sp<95)tf=2; else if(sp<105)tf=3; else tf=4;\n    const fScore=Math.max(0,100-Math.abs(fo.indexOf(s.flex)-tf)*34);\n    const tl=p.flight==='Lower'?0:p.flight==='Higher'?2:1;\n    const lScore=Math.max(0,100-Math.abs(lo.indexOf(s.launch)-tl)*38);\n    const tw=p.weightPref==='Lighter'?82:p.weightPref==='Heavier'?128:108;\n    const wScore=Math.max(0,100-Math.abs(s.weight-tw)*2.4);\n    const mScore=p.material==='Any'?100:(s.material===p.material?100:0);\n    return Math.round(fScore*0.34+lScore*0.26+wScore*0.22+mScore*0.18);\n  }\n\n  _flexHint(sp){ if(sp<75)return 'Ladies'; if(sp<84)return 'Senior'; if(sp<95)return 'Regular'; if(sp<105)return 'Stiff'; return 'X-Stiff'; }\n\n  _toggle(key,v){ this.setState(s=>{ const a=s[key]; return { [key]: a.includes(v)?a.filter(x=>x!==v):[...a,v] }; }); }\n  _toggleCompare(id){ this.setState(s=>{ if(s.compare.includes(id)) return {compare:s.compare.filter(x=>x!==id)}; if(s.compare.length>=4) return {}; return {compare:[...s.compare,id]}; }); }\n\n  renderVals(){\n    const S=this.state, self=this;\n    const all=this._data();\n    const fo=['Ladies','Senior','Regular','Stiff','X-Stiff'];\n    const lo=['Low','Mid','High'];\n    const compact=!!this.props.compact;\n\n    const chip=(a)=>({padding:'7px 12px',borderRadius:'999px',border:'1px solid '+(a?'#1f5135':'#dad7cc'),background:a?'#1f5135':'#fff',color:a?'#fbfaf5':'#3c3f38',fontSize:'12.5px',fontWeight:a?600:500,cursor:'pointer',whiteSpace:'nowrap',userSelect:'none',display:'inline-flex',alignItems:'center',gap:'7px'});\n    const flexChipS=(a,c)=>({padding:'7px 13px',borderRadius:'999px',border:'1px solid '+(a?c:'#dad7cc'),background:a?c:'#fff',color:a?'#fff':c,fontSize:'12.5px',fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',userSelect:'none'});\n    const seg=(a)=>({flex:'1',padding:'10px 6px',borderRadius:'9px',border:'1px solid '+(a?'#1f5135':'#dad7cc'),background:a?'#e8efe7':'#fff',color:a?'#1f5135':'#5c5f57',fontSize:'13px',fontWeight:a?600:500,cursor:'pointer',fontFamily:\"'Hanken Grotesk',sans-serif\"});\n\n    // facet chips\n    const brandOrder=['True Temper','KBS','Nippon','Mitsubishi','Aerotech','UST Mamiya'];\n    const matOrder=['Steel','Graphite','Composite'];\n    const matDotC={Steel:'#44627a',Graphite:'#a9692f',Composite:'#7a5aa6'};\n    const brandChips=brandOrder.map(v=>({label:v,active:S.brands.includes(v),onClick:()=>self._toggle('brands',v),style:chip(S.brands.includes(v))}));\n    const matChips=matOrder.map(v=>{const a=S.materials.includes(v);return {label:v,active:a,onClick:()=>self._toggle('materials',v),style:chip(a),dot:{width:'9px',height:'9px',borderRadius:'50%',background:matDotC[v],display:'inline-block'}};});\n    const flexColor={Ladies:'#7a5aa6',Senior:'#3f7f8a',Regular:'#2f7a55',Stiff:'#b06a2a','X-Stiff':'#9a3a2a'};\n    const flexChips=fo.map(v=>{const a=S.flexes.includes(v);return {label:v,active:a,onClick:()=>self._toggle('flexes',v),style:flexChipS(a,flexColor[v])};});\n    const launchChips=lo.map(v=>({label:v,active:S.launches.includes(v),onClick:()=>self._toggle('launches',v),style:chip(S.launches.includes(v))}));\n\n    // filter\n    const q=S.search.trim().toLowerCase();\n    let rows=all.filter(s=>{\n      if(q && !(s.name.toLowerCase().includes(q)||s.family.toLowerCase().includes(q)||s.brand.toLowerCase().includes(q))) return false;\n      if(S.brands.length && !S.brands.includes(s.brand)) return false;\n      if(S.materials.length && !S.materials.includes(s.material)) return false;\n      if(S.flexes.length && !S.flexes.includes(s.flex)) return false;\n      if(S.launches.length && !S.launches.includes(s.launch)) return false;\n      if(s.weight<S.wMin || s.weight>S.wMax) return false;\n      return true;\n    });\n\n    const prof=S.matchProfile;\n    if(prof) rows.forEach(s=>{ s.matchScore=this._score(s,prof); });\n    if(prof && S.topOnly) rows=rows.filter(s=>s.matchScore>=72);\n\n    const dir=S.sortDir==='asc'?1:-1, key=S.sortKey;\n    rows=rows.slice().sort((a,b)=>{\n      if(key==='match') return (b.matchScore||0)-(a.matchScore||0);\n      let av,bv;\n      if(key==='flex'){av=fo.indexOf(a.flex);bv=fo.indexOf(b.flex);}\n      else if(key==='launch'){av=lo.indexOf(a.launch);bv=lo.indexOf(b.launch);}\n      else if(key==='weight'){av=a.weight;bv=b.weight;}\n      else if(key==='brand'){av=a.brand.toLowerCase();bv=b.brand.toLowerCase();}\n      else {av=a.name.toLowerCase();bv=b.name.toLowerCase();}\n      if(av<bv)return -1*dir; if(av>bv)return 1*dir; return a.weight-b.weight;\n    });\n\n    // per-row presentation\n    const launchPillMap={Low:{background:'#edf1ef',color:'#3f5a4c'},Mid:{background:'#e9f1ea',color:'#2f6a45'},High:{background:'#fbf0e2',color:'#9a5a1f'}};\n    const pillBase={padding:'3px 10px',borderRadius:'999px',fontSize:'11.5px',fontWeight:600,display:'inline-block',whiteSpace:'nowrap'};\n    const scoreStyleFor=(sc)=>{const c=sc>=80?'#1f5135':sc>=65?'#b06a2a':'#9a3a2a';const bg=sc>=80?'#e8efe7':sc>=65?'#fbf0e2':'#f7e9e6';return {fontFamily:\"'Spline Sans Mono',monospace\",fontSize:'12.5px',fontWeight:600,color:c,background:bg,padding:'3px 9px',borderRadius:'7px',whiteSpace:'nowrap'};};\n    const cellPad=compact?'8px 14px':'11px 14px';\n    rows=rows.map(s=>{\n      const sel=S.compare.includes(s.id);\n      const flexPill={...pillBase,background:s.flexColor+'22',color:s.flexColor,fontFamily:\"'Spline Sans Mono',monospace\"};\n      const wpct=Math.max(4,Math.min(100,(s.weight-50)/85*100));\n      return Object.assign({},s,{\n        selected:sel,\n        onToggle:()=>self._toggleCompare(s.id),\n        checkMark:sel?'✓':'',\n        checkStyle:{width:'22px',height:'22px',borderRadius:'6px',border:'1.5px solid '+(sel?'#1f5135':'#cfccc0'),background:sel?'#1f5135':'#fff',color:'#fff',fontSize:'12px',lineHeight:'1',cursor:'pointer',display:'inline-flex',alignItems:'center',justifyContent:'center',padding:0},\n        dotStyle:{width:'9px',height:'9px',borderRadius:'50%',background:s.matColor,display:'inline-block',flex:'none'},\n        weightText:(s.approx?'~':'')+s.weight+' g',\n        flexPill,\n        launchPill:{...pillBase,...launchPillMap[s.launch]},\n        weightBar:{width:wpct+'%',height:'100%',background:s.matColor,borderRadius:'3px'},\n        rowStyle:{borderTop:'1px solid #f0eee4',background:sel?'#f3f6f1':'transparent'},\n        cardStyle:{background:sel?'#f3f6f1':'#fffdf8',border:'1px solid '+(sel?'#cfe0d0':'#e5e2d8'),borderRadius:'13px',padding:'15px 16px'},\n        showScore:prof!=null,\n        scoreText:s.matchScore!=null?String(s.matchScore):'',\n        scoreStyle:s.matchScore!=null?scoreStyleFor(s.matchScore):{}\n      });\n    });\n\n    // chart — axis dynamically zooms to the currently filtered set\n    const rw=rows.map(r=>r.weight);\n    let chartTicks=[], yBands=[], gridLines=[], chartPoints=[], chartDomain='';\n    if(rw.length){\n      let dMin=Math.min.apply(null,rw), dMax=Math.max.apply(null,rw), lo, hi;\n      if(dMin===dMax){ lo=dMin-5; hi=dMax+5; }\n      else { const pad=Math.max(2,Math.round((dMax-dMin)*0.08)); lo=Math.floor((dMin-pad)/5)*5; hi=Math.ceil((dMax+pad)/5)*5; }\n      chartDomain=lo+'–'+hi+' g';\n      for(let i=0;i<5;i++){ const v=Math.round(lo+(hi-lo)*i/4); chartTicks.push({label:(i===0||i===4)?v+'g':String(v)}); }\n      const order=['High','Mid','Low'];\n      const present=order.filter(l=>rows.some(r=>r.launch===l));\n      const n=present.length;\n      const yFor=(i)=> n<=1?50:(16+i*(68/(n-1)));\n      const bandY={};\n      const yLabelBase={position:'absolute',left:'-30px',fontSize:'11px',color:'#9aa093',fontFamily:\"'Spline Sans Mono',monospace\",transform:'translateY(-50%)'};\n      present.forEach((l,i)=>{ const t=yFor(i); bandY[l]=t; yBands.push({label:l==='High'?'HI':l==='Mid'?'MID':'LO',style:{...yLabelBase,top:t+'%'}}); gridLines.push({style:{position:'absolute',left:0,right:0,top:t+'%',borderTop:'1px dashed #ece9dd'}}); });\n      const amp=n>=3?4.2:(n===2?6:9);\n      chartPoints=rows.map(s=>{\n        const x=Math.max(1.5,Math.min(98.5,(s.weight-lo)/(hi-lo)*100));\n        const jit=((s.id%5)-2)*(amp/2);\n        const y=Math.max(6,Math.min(94,bandY[s.launch]+jit));\n        const sel=s.selected;\n        return {id:s.id,onClick:s.onToggle,title:s.name+' · '+s.weightText+' · '+s.flexLabel+' · '+s.launch+' launch',\n          style:{position:'absolute',left:x+'%',top:y+'%',transform:'translate(-50%,-50%)',width:sel?'15px':'12px',height:sel?'15px':'12px',borderRadius:'50%',background:s.matColor,border:sel?'2.5px solid #1b1d1a':'1.5px solid #fffdf8',cursor:'pointer',padding:0,boxShadow:'0 1px 3px rgba(0,0,0,.18)'}};\n      });\n    }\n\n    // compare\n    const compareItems=S.compare.map(id=>all.find(d=>d.id===id)).filter(Boolean).map(s=>Object.assign({},s,{\n      onRemove:()=>self._toggleCompare(s.id),\n      dotStyle:{width:'9px',height:'9px',borderRadius:'50%',background:s.matColor,display:'inline-block',flex:'none'}\n    }));\n    const weights=compareItems.map(s=>s.weight);\n    const minW=Math.min.apply(null,weights), maxW=Math.max.apply(null,weights);\n    const tdBase={padding:'12px 14px',fontSize:'13.5px',color:'#1b1d1a',verticalAlign:'top'};\n    const mkRow=(label,fn,hl)=>({label,cells:compareItems.map(s=>{\n      let style={...tdBase};\n      if(hl==='w' && weights.length>1 && minW!==maxW){ if(s.weight===minW){style.color='#1f5135';style.fontWeight=700;} else if(s.weight===maxW){style.color='#9a3a2a';style.fontWeight=700;} }\n      return {text:fn(s),style};\n    })});\n    const compareMatrix=[\n      mkRow('Brand',s=>s.brand),\n      mkRow('Family',s=>s.family),\n      mkRow('Material',s=>s.material),\n      mkRow('Flex',s=>s.flexLabel+' · '+s.flex),\n      mkRow('Weight',s=>(s.approx?'~':'')+s.weight+' g','w'),\n      mkRow('Launch',s=>s.launch),\n      mkRow('Upcharge',s=>s.up>0?'+$'+s.up:'Included')\n    ];\n    if(prof) compareMatrix.push(mkRow('Fit score',s=>this._score(s,prof)+' / 100'));\n\n    // sort options\n    const sortOptions=[];\n    if(prof) sortOptions.push({value:'match:desc',label:'Best fit first'});\n    sortOptions.push(\n      {value:'weight:asc',label:'Weight · light → heavy'},\n      {value:'weight:desc',label:'Weight · heavy → light'},\n      {value:'flex:asc',label:'Flex · soft → stiff'},\n      {value:'flex:desc',label:'Flex · stiff → soft'},\n      {value:'launch:asc',label:'Launch · low → high'},\n      {value:'name:asc',label:'Name · A → Z'},\n      {value:'brand:asc',label:'Brand · A → Z'}\n    );\n\n    const views=[['table','Table'],['cards','Cards'],['chart','Chart']];\n    const viewBtn=(a)=>({padding:'8px 15px',borderRadius:'8px',border:'none',background:a?'#fffdf8':'transparent',color:a?'#1f5135':'#6b6f66',fontSize:'13px',fontWeight:a?600:500,cursor:'pointer',fontFamily:\"'Hanken Grotesk',sans-serif\",boxShadow:a?'0 1px 3px rgba(0,0,0,.08)':'none'});\n    const viewOptions=views.map(([k,l])=>({label:l,onClick:()=>self.setState({view:k}),style:viewBtn(S.view===k)}));\n\n    const arrow=(k)=>S.sortKey===k?(S.sortDir==='asc'?'↑':'↓'):'';\n    const hSort=(k)=>()=>self.setState(s=>({sortKey:k,sortDir:(s.sortKey===k&&s.sortDir==='asc')?'desc':'asc'}));\n\n    const activeCount=S.brands.length+S.materials.length+S.flexes.length+S.launches.length+((S.wMin!==50||S.wMax!==135)?1:0)+(q?1:0);\n\n    // wizard option builders\n    const w=S.wiz;\n    const flightOpts=['Lower','Neutral','Higher'].map(v=>({label:v,onClick:()=>self.setState(st=>({wiz:{...st.wiz,flight:v}})),style:seg(w.flight===v)}));\n    const weightOpts=['Lighter','Balanced','Heavier'].map(v=>({label:v,onClick:()=>self.setState(st=>({wiz:{...st.wiz,weightPref:v}})),style:seg(w.weightPref===v)}));\n    const matOpts=['Any','Steel','Graphite','Composite'].map(v=>({label:v,onClick:()=>self.setState(st=>({wiz:{...st.wiz,material:v}})),style:seg(w.material===v)}));\n\n    const wizSummary=w.speed+' mph · '+w.flight.toLowerCase()+' launch · '+w.weightPref.toLowerCase()+' weight'+(w.material!=='Any'?(' · '+w.material.toLowerCase()):'');\n\n    const cbtn=(dis)=>({background:dis?'#3a3d36':'#3c8a57',color:dis?'#7c7f77':'#fff',border:'none',borderRadius:'9px',padding:'9px 16px',fontFamily:\"'Hanken Grotesk',sans-serif\",fontSize:'13.5px',fontWeight:600,cursor:dis?'default':'pointer',whiteSpace:'nowrap'});\n\n    return {\n      total:all.length, shownCount:rows.length, isEmpty:rows.length===0,\n      search:S.search, onSearch:e=>self.setState({search:e.target.value}),\n      viewOptions, isTable:S.view==='table', isCards:S.view==='cards', isChart:S.view==='chart',\n      sortValue:S.sortKey+':'+S.sortDir, sortOptions,\n      onSortChange:e=>{const p=e.target.value.split(':');self.setState({sortKey:p[0],sortDir:p[1]});},\n      brandChips, matChips, flexChips, launchChips,\n      wMin:S.wMin, wMax:S.wMax,\n      onWMin:e=>{const v=+e.target.value;self.setState(s=>({wMin:Math.min(v,s.wMax)}));},\n      onWMax:e=>{const v=+e.target.value;self.setState(s=>({wMax:Math.max(v,s.wMin)}));},\n      activeCount, hasActive:activeCount>0,\n      onReset:()=>self.setState({search:'',brands:[],materials:[],flexes:[],launches:[],wMin:50,wMax:135}),\n      rows, chartPoints, chartTicks, yBands, gridLines, chartDomain,\n      matchActive:prof!=null, wizSummary:prof?wizSummary:'', topOnly:S.topOnly,\n      onTopOnly:e=>self.setState({topOnly:e.target.checked}),\n      onClearMatch:()=>self.setState({matchProfile:null,topOnly:false,sortKey:'weight',sortDir:'asc'}),\n      aName:arrow('name'),aBrand:arrow('brand'),aFlex:arrow('flex'),aWeight:arrow('weight'),aLaunch:arrow('launch'),\n      hName:hSort('name'),hBrand:hSort('brand'),hFlex:hSort('flex'),hWeight:hSort('weight'),hLaunch:hSort('launch'),\n      hasCompare:S.compare.length>0, compareCount:S.compare.length, compareItems,\n      compareDisabled:S.compare.length<2, compareBtnStyle:cbtn(S.compare.length<2),\n      onClearCompare:()=>self.setState({compare:[]}),\n      onOpenCompare:()=>{ if(S.compare.length>=2) self.setState({showCompare:true}); },\n      showCompare:S.showCompare, onCloseCompare:()=>self.setState({showCompare:false}),\n      compareMatrix, stop:e=>e.stopPropagation(),\n      wizardOpen:S.wizardOpen, onOpenWizard:()=>self.setState({wizardOpen:true}), onCloseWizard:()=>self.setState({wizardOpen:false}),\n      wizSpeed:w.speed, wizFlexHint:this._flexHint(w.speed),\n      onWizSpeed:e=>self.setState(st=>({wiz:{...st.wiz,speed:+e.target.value}})),\n      flightOpts, weightOpts, matOpts,\n      onApplyWizard:()=>self.setState(s=>({matchProfile:{...s.wiz},sortKey:'match',sortDir:'desc',wizardOpen:false,topOnly:false}))\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fdiv><\u002Fx-dc><\u002Fbody><\u002Fhtml>"
